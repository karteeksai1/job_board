name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js using package.json engine or Node 20 fallback
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      # 3. Cache Next.js compilation cache
      - name: Cache Next.js bundle
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      # 4. Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 5. Generate Prisma Client
      - name: Generate Prisma Client
        run: npx prisma generate

      # 6. Run lint checks
      - name: Run Linter
        run: npm run lint

      # 7. Run test suite if defined
      - name: Run Tests
        run: |
          if npm run | grep -q "^  test$"; then
            npm test
          else
            echo "No test script defined in package.json. Skipping."
          fi

      # 8. Run build to catch compile or type errors
      - name: Run Build
        run: npm run build

      # 9. Comment on Pull Request confirming success
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **CI Build Passed!** Linting, Prisma generation, and Next.js production build succeeded. It is safe to merge.'
            })
